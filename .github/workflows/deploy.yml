name: Create release and build artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VERSION: ${{ github.ref_name }}

jobs:
  windows:
    name: Build Windows artifact
    runs-on: windows-2025-vs2026
    timeout-minutes: 75

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-7zip
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nodejs

      - name: Checkout XMRig deps
        run: git clone --depth 1 https://github.com/xmrig/xmrig-deps.git

      - name: Build and run offline proxy integration test
        run: XMRIG_DEPS="$PWD/xmrig-deps/gcc/x64" node run_tests.js --cmake-generator Ninja

      - name: Package
        run: |
          mkdir -p package
          cp build/xmrig-proxy.exe package/
          cp src/config.json package/
          (cd package && 7z a -tzip -mx=9 "../xmrig-proxy-${VERSION}-win64.zip" xmrig-proxy.exe config.json)

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows
          path: xmrig-proxy-${{ env.VERSION }}-win64.zip
          retention-days: 7
          if-no-files-found: error

  ubuntu:
    name: Build Ubuntu artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            libssl-dev \
            libuv1-dev

      - name: Build and run offline proxy integration test
        run: node run_tests.js

      - name: Package
        run: |
          mkdir -p package
          cp build/xmrig-proxy package/
          cp src/config.json package/
          tar -C package -czf "xmrig-proxy-${VERSION}-lin64.tar.gz" xmrig-proxy config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu
          path: xmrig-proxy-${{ env.VERSION }}-lin64.tar.gz
          retention-days: 7
          if-no-files-found: error

  macos:
    name: Build macOS ${{ matrix.suffix }} artifact
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            suffix: mac-arm64
          - runner: macos-15-intel
            suffix: mac-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          missing=()
          for formula in cmake libuv openssl@3; do
            brew list --formula "$formula" >/dev/null 2>&1 || missing+=("$formula")
          done
          if ((${#missing[@]})); then
            brew install "${missing[@]}"
          fi

      - name: Build and run offline proxy integration test
        run: OPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" node run_tests.js

      - name: Package
        run: |
          mkdir -p package
          cp build/xmrig-proxy package/
          cp src/config.json package/
          tar -C package -czf "xmrig-proxy-${VERSION}-${{ matrix.suffix }}.tar.gz" xmrig-proxy config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.suffix }}
          path: xmrig-proxy-${{ env.VERSION }}-${{ matrix.suffix }}.tar.gz
          retention-days: 7
          if-no-files-found: error

  release:
    name: Create release and publish artifacts
    runs-on: ubuntu-24.04
    needs:
      - windows
      - ubuntu
      - macos

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
