name: Create release and build artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VERSION: ${{ github.ref_name }}

jobs:
  windows:
    name: Build Windows artifact
    runs-on: windows-2025-vs2026
    timeout-minutes: 75

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-7zip
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nodejs

      - name: Checkout XMRig deps
        run: git clone --depth 1 https://github.com/xmrig/xmrig-deps.git

      - name: Build and run offline proxy integration test
        run: XMRIG_DEPS="$PWD/xmrig-deps/gcc/x64" node run_tests.js --cmake-generator Ninja

      - name: Package
        run: |
          mkdir -p package
          cp build/xmrig-proxy.exe package/
          cp src/config.json package/
          (cd package && 7z a -tzip -mx=9 "../xmrig-proxy-${VERSION}-win.zip" xmrig-proxy.exe config.json)

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: win
          path: xmrig-proxy-${{ env.VERSION }}-win.zip
          retention-days: 7
          if-no-files-found: error

  ubuntu:
    name: Build Ubuntu artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            libssl-dev \
            libuv1-dev

      - name: Build and run offline proxy integration test
        run: node run_tests.js

      - name: Package
        run: |
          mkdir -p package
          cp build/xmrig-proxy package/
          cp src/config.json package/
          tar -C package -czf "xmrig-proxy-${VERSION}-lin.tar.gz" xmrig-proxy config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lin
          path: xmrig-proxy-${{ env.VERSION }}-lin.tar.gz
          retention-days: 7
          if-no-files-found: error

  ubuntu-compat:
    name: Build glibc 2.12 compatible artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare source archive
        run: tar --exclude=.git -czf /tmp/xmrig-proxy-source.tar.gz .

      - name: Run build inside manylinux2010
        run: |
          mkdir -p /tmp/xmrig-proxy-docker
          cp /tmp/xmrig-proxy-source.tar.gz /tmp/xmrig-proxy-docker/source.tar.gz
          cat >/tmp/xmrig-proxy-docker/build.sh <<'EOF'
          set -eux

          export PATH="/opt/rh/devtoolset-8/root/usr/bin:${PATH}"
          export CC=gcc
          export CXX=g++
          JOBS="$(nproc)"
          DEPS=/tmp/xmrig-proxy/deps
          UV_VERSION=1.44.2
          OPENSSL_VERSION=1.1.1u
          OPENSSL_TAG=OpenSSL_1_1_1u

          gcc --version
          g++ --version
          ldd --version | head -n 1
          if ! command -v wget >/dev/null 2>&1; then
            cat >/usr/local/bin/wget <<'EOS'
          #!/bin/sh
          if [ "$2" = "-O" ] && [ -n "$3" ]; then
            exec curl -fsSL "$1" -o "$3"
          fi
          exec curl -fsSLO "$1"
          EOS
            chmod +x /usr/local/bin/wget
          fi

          curl -fsSL https://cmake.org/files/v3.16/cmake-3.16.9.tar.gz | tar -xzC /tmp
          (cd /tmp/cmake-3.16.9 && ./bootstrap --parallel="${JOBS}" -- -DCMAKE_USE_OPENSSL=OFF && make -j"${JOBS}" && make install)

          mkdir -p /tmp/xmrig-proxy
          tar -xzf /tmp/xmrig-proxy-docker/source.tar.gz -C /tmp/xmrig-proxy
          cd /tmp/xmrig-proxy
          mkdir -p "${DEPS}/include" "${DEPS}/lib" deps-build

          wget "https://dist.libuv.org/dist/v${UV_VERSION}/libuv-v${UV_VERSION}.tar.gz" -O "deps-build/libuv-v${UV_VERSION}.tar.gz"
          tar -xzf "deps-build/libuv-v${UV_VERSION}.tar.gz" -C deps-build
          (cd "deps-build/libuv-v${UV_VERSION}" && sh autogen.sh && ./configure --disable-shared && make -j"${JOBS}")
          cp -fr "deps-build/libuv-v${UV_VERSION}/include" "${DEPS}/"
          cp "deps-build/libuv-v${UV_VERSION}/.libs/libuv.a" "${DEPS}/lib/"

          wget "https://github.com/openssl/openssl/releases/download/${OPENSSL_TAG}/openssl-${OPENSSL_VERSION}.tar.gz" -O "deps-build/openssl-${OPENSSL_VERSION}.tar.gz"
          tar -xzf "deps-build/openssl-${OPENSSL_VERSION}.tar.gz" -C deps-build
          (cd "deps-build/openssl-${OPENSSL_VERSION}" && ./config -no-shared -no-asm -no-zlib -no-comp -no-dgram -no-filenames -no-cms no-tests && make build_libs -j"${JOBS}")
          cp -fr "deps-build/openssl-${OPENSSL_VERSION}/include" "${DEPS}/"
          cp "deps-build/openssl-${OPENSSL_VERSION}/libcrypto.a" "${DEPS}/lib/"
          cp "deps-build/openssl-${OPENSSL_VERSION}/libssl.a" "${DEPS}/lib/"

          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DXMRIG_DEPS="${DEPS}"
          cmake --build build --parallel "${JOBS}"

          if readelf --version-info build/xmrig-proxy | grep -E 'Name: GLIBC_2\.(1[3-9]|[2-9][0-9])'; then
            echo "compat binary requires a newer glibc than 2.12"
            exit 1
          fi

          if readelf --version-info build/xmrig-proxy | grep -E 'Name: (GLIBCXX_|CXXABI_)'; then
            echo "compat binary must not depend on dynamic libstdc++"
            exit 1
          fi

          mkdir -p /tmp/package
          cp build/xmrig-proxy /tmp/package/
          cp src/config.json /tmp/package/
          cp build/xmrig-proxy /tmp/xmrig-proxy-docker/xmrig-proxy-compat
          tar -C /tmp/package -czf "/tmp/xmrig-proxy-docker/xmrig-proxy-${VERSION}-lin-compat.tar.gz" xmrig-proxy config.json
          EOF
          chmod +x /tmp/xmrig-proxy-docker/build.sh
          docker run --rm \
            -e VERSION="${VERSION}" \
            -v /tmp/xmrig-proxy-docker:/tmp/xmrig-proxy-docker \
            quay.io/pypa/manylinux2010_x86_64 \
            /bin/bash /tmp/xmrig-proxy-docker/build.sh

      - name: Run compat artifact test suite
        run: node run_tests.js --skip-build --binary /tmp/xmrig-proxy-docker/xmrig-proxy-compat

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lin-compat
          path: /tmp/xmrig-proxy-docker/xmrig-proxy-${{ env.VERSION }}-lin-compat.tar.gz
          retention-days: 7
          if-no-files-found: error

  macos:
    name: Build macOS ${{ matrix.suffix }} artifact
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            suffix: mac
          - runner: macos-15-intel
            suffix: mac-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          missing=()
          for formula in cmake libuv openssl@3; do
            brew list --formula "$formula" >/dev/null 2>&1 || missing+=("$formula")
          done
          if ((${#missing[@]})); then
            brew install "${missing[@]}"
          fi

      - name: Build and run offline proxy integration test
        run: OPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" node run_tests.js

      - name: Package
        run: |
          mkdir -p package
          cp build/xmrig-proxy package/
          cp src/config.json package/
          tar -C package -czf "xmrig-proxy-${VERSION}-${{ matrix.suffix }}.tar.gz" xmrig-proxy config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.suffix }}
          path: xmrig-proxy-${{ env.VERSION }}-${{ matrix.suffix }}.tar.gz
          retention-days: 7
          if-no-files-found: error

  release:
    name: Create release and publish artifacts
    runs-on: ubuntu-24.04
    needs:
      - windows
      - ubuntu
      - ubuntu-compat
      - macos

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
